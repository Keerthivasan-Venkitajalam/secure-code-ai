version: '3.8'

services:
  secureai-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        GPU: "false"  # Set to "true" for GPU support
    container_name: secureai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override specific settings if needed
      - SECUREAI_HOST=0.0.0.0
      - SECUREAI_PORT=8000
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/gcp-service-account.json}
    volumes:
      # Mount local code directory for development (hot reload)
      - ../api:/app/api:ro
      - ../agent:/app/agent:ro
      - ../__init__.py:/app/__init__.py:ro
      
      # Mount Google Cloud credentials (read-only for security)
      - ./secrets:/app/secrets:ro
      
      # Mount models directory as persistent volume
      - models-data:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  models-data:
    driver: local
